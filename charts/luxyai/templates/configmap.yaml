apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "luxyai.fullname" . }}-config
  namespace: {{ include "luxyai.namespace" . }}
  labels:
    {{- include "luxyai.labels" . | nindent 4 }}
data:
  APP_BUILD_VERSION: {{ .Chart.AppVersion | quote }}
  {{- range $key, $value := .Values.config }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  CONSOLE_ADMIN_MODE: {{ ternary "true" "false" .Values.admin.enabled | quote }}
  CONSOLE_ADMIN_USERS: {{ .Values.admin.users | quote }}
  CONSOLE_ADMIN_TRUSTED_IDENTITY: {{ ternary "true" "false" .Values.admin.trustIdentityHeader | quote }}
  OBSERVABILITY_URL: {{ printf "http://%s-agents:8100" (include "luxyai.fullname" .) | quote }}
  HEALING_AGENT_URL: {{ printf "http://%s-agents:8101/a2a/tasks" (include "luxyai.fullname" .) | quote }}
  INCIDENT_AGENT_URL: {{ printf "http://%s-agents:8102/a2a/tasks" (include "luxyai.fullname" .) | quote }}
  POSTMORTEM_AGENT_URL: {{ printf "http://%s-agents:8103/a2a/tasks" (include "luxyai.fullname" .) | quote }}
  MCP_SERVER_URL: {{ printf "http://%s-agents:8105/mcp" (include "luxyai.fullname" .) | quote }}
  ADAPTER_URL: {{ printf "http://%s-agents:8200" (include "luxyai.fullname" .) | quote }}
  MODEL_PROFILES_STORE: /var/lib/luxyai/model-profiles.json
  KNOWLEDGE_STORE_PATH: /var/lib/luxyai/knowledge-base.json
  OPS_SKILL_ROOT: /var/lib/luxyai/ops-skills
  OPS_SKILL_STORE_PATH: /var/lib/luxyai/ops-skills.json
  RELIABILITY_STORE_PATH: /var/lib/luxyai/reliability-state.json
  RELIABILITY_STORE_FALLBACK_PATH: /tmp/luxyai/reliability-state.json
  EFFECTIVENESS_STORE_PATH: /var/lib/luxyai/effectiveness-state.json
  EFFECTIVENESS_STORE_FALLBACK_PATH: /tmp/luxyai-effectiveness-state.json
  LUXYAI_CUSTOM_ALGORITHM_PATH: /var/lib/luxyai-custom/aiops_algorithms_custom.py
