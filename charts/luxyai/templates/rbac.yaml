{{- if .Values.rbac.create }}
{{- if eq .Values.rbac.mode "cluster-admin" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "luxyai.fullname" . }}-cluster-admin
  labels:
    {{- include "luxyai.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: {{ include "luxyai.serviceAccountName" . }}
    namespace: {{ include "luxyai.namespace" . }}
{{- else }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "luxyai.fullname" . }}-controlled-operator
  labels:
    {{- include "luxyai.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["namespaces", "nodes", "pods", "pods/status", "pods/log", "events", "services", "endpoints", "persistentvolumeclaims", "persistentvolumes", "configmaps", "serviceaccounts", "resourcequotas", "limitranges"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete", "patch", "update"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims", "persistentvolumes", "configmaps"]
    verbs: ["create", "patch", "update"]
  - apiGroups: [""]
    resources: ["serviceaccounts", "services", "nodes"]
    verbs: ["patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale", "statefulsets", "statefulsets/scale", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods/eviction"]
    verbs: ["create"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses", "csidrivers", "csinodes", "volumeattachments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "luxyai.fullname" . }}-controlled-operator
  labels:
    {{- include "luxyai.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "luxyai.fullname" . }}-controlled-operator
subjects:
  - kind: ServiceAccount
    name: {{ include "luxyai.serviceAccountName" . }}
    namespace: {{ include "luxyai.namespace" . }}
{{- end }}
{{- end }}
