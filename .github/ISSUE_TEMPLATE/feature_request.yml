name: Feature request
description: Suggest an improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What operations problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the user experience, API, or workflow change.
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety considerations
      description: RBAC, approval, audit, rollback, or data-handling considerations.
