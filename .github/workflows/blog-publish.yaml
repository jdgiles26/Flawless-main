name: blog-publish

on:
  push:
    branches: [main]
    paths:
      - "blog/**"
      - "scripts/build_blog.py"
      - "scripts/publish_blog.py"
      - "scripts/submit_indexnow.py"
      - ".github/workflows/blog-publish.yaml"
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: blog/requirements.txt
      - name: Install blog dependencies
        run: python -m pip install -r blog/requirements.txt
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Build canonical blog
        run: >-
          python scripts/build_blog.py
          --base-url https://william-lu-stack.github.io/LuxyAI
          --output public
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  syndicate:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: deploy
    env:
      DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: blog/requirements.txt
      - name: Install syndication dependencies
        run: python -m pip install -r blog/requirements.txt
      - name: Publish or update DEV articles
        run: >-
          python scripts/publish_blog.py
          --platform devto
          --base-url https://william-lu-stack.github.io/LuxyAI
          --allow-missing-token
      - name: Notify IndexNow
        continue-on-error: true
        run: >-
          python scripts/submit_indexnow.py
          --base-url https://william-lu-stack.github.io/LuxyAI
