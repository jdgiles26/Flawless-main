<article class="post-shell">
  <header class="post-header">
    <p class="eyebrow">{{ post.series }} · {{ post.date_display }}</p>
    <h1>{{ post.title }}</h1>
    <p class="post-deck">{{ post.description }}</p>
    <div class="byline">
      <span>jdgiles26</span>
      <span>{{ post.reading_time }} min read</span>
    </div>
  </header>
  <figure class="post-cover">
    <img src="{{ post.cover_url }}" alt="{{ post.cover_alt }}">
  </figure>
  <div class="post-content">{{ post.html | safe }}</div>
  <footer class="post-cta">
    <p class="eyebrow">BUILD WITH US</p>
    <h2>Inspect the code. Challenge the design. Shape what comes next.</h2>
    <a class="primary-action" href="{{ repository_url }}">Star Flawless on GitHub</a>
  </footer>
</article>
