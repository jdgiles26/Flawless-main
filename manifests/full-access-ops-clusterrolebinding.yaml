# ============================================================
# luxyai Full Access Operations Binding
#
# Purpose:
# - For private-network validation environments only, or a global automated on-call mode
#   approved by the security team.
# - Grants k8s-agent-sa cluster-admin, letting it read logs, Events, Workloads, and
#   ConfigMap/Secret metadata across all namespaces, and execute high-privilege actions such
#   as node containment, PV/PVC, and release governance.
#
# Production recommendation:
# - Do not apply this file by default; prefer rbac.yaml + advanced-ops-clusterrolebindings.yaml.
# - If you must apply it, make sure CONSOLE_AUTH_REQUIRED=true, integrate your organization's
#   SSO, enable audit logging, and keep OPS_MUTATION_ENABLED, human confirmation, and
#   high-risk secondary confirmation in place.
#
# Enable:
#   kubectl apply -f manifests/full-access-ops-clusterrolebinding.yaml
#
# Rollback:
#   kubectl delete -f manifests/full-access-ops-clusterrolebinding.yaml
# ============================================================

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-agent-full-access-ops
subjects:
  - kind: ServiceAccount
    name: k8s-agent-sa
    namespace: k8s-agent
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
