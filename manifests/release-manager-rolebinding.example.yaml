# Copy this file per approved application namespace. Never bind the release
# manager ClusterRole cluster-wide.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k8s-agent-release-manager
  namespace: replace-with-approved-namespace
subjects:
  - kind: ServiceAccount
    name: k8s-agent-sa
    namespace: k8s-agent
roleRef:
  kind: ClusterRole
  name: k8s-agent-release-manager
  apiGroup: rbac.authorization.k8s.io
