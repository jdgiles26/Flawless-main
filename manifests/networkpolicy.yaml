# Optional network policy: this manifest does not guess or restrict private-network CIDRs.
# NodePort 30080 is exposed on the cluster nodes' private network addresses; public network
# isolation is the responsibility of your organization's routing, firewalls, and security
# appliances.
# This NetworkPolicy only explicitly allows all ingress and egress traffic for Pods within
# this namespace, avoiding legacy default-deny policies that make the console, backend
# services, CMDB, Prometheus, or the model gateway unreachable.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: k8s-agent-allow-all-internal
  namespace: k8s-agent
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - {}
  egress:
    - {}
