# ============================================================
# Control Plane API + Web Service — AI SRE Ops Console
#
# Prerequisite: build a single integrated backend image only; the image already includes
#   frontend/dist.
#   docker build --target backend-runtime -t <repo>/luxyai:<tag> .
#   docker push <repo>/luxyai:<tag>
#
# Deploy:
#   kubectl apply -f manifests/rbac.yaml
#   kubectl apply -f manifests/deployment.yaml   # provides the unified ConfigMap: k8s-agent-config
#   kubectl apply -f manifests/frontend.yaml
#
# You only need to build frontend-runtime separately if you want to split out an independent
# Nginx web image.
# The current manifest defaults to a single-image deployment and no longer references
# k8s-agent-web.
# ============================================================

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: luxyai-runtime-store
  namespace: k8s-agent
  labels:
    app: luxyai-runtime-store
    component: runtime-store
spec:
  storageClassName: standard
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-agent-api
  namespace: k8s-agent
  labels:
    app: k8s-agent-api
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-agent-api
  template:
    metadata:
      labels:
        app: k8s-agent-api
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/luxyai/luxyai:latest
          imagePullPolicy: Always
          command:
            - python
            - -m
            - uvicorn
            - backend.app.main:app
            - --host
            - 0.0.0.0
            - --port
            - "8080"
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                # Uniformly uses k8s-agent-config from deployment.yaml, avoiding duplicate
                # CMDB/Prometheus configuration maintenance.
                name: k8s-agent-config
            - secretRef:
                name: k8s-agent-oauth
                optional: true
            - secretRef:
                # Contains only CONSOLE_BASIC_AUTH_USERNAME/PASSWORD; created by your
                # organization's Secret management system.
                name: luxyai-console-auth
                optional: true
          env:
            - name: FRONTEND_PORT
              value: "8080"
            - name: LUXYAI_CUSTOM_ALGORITHM_PATH
              value: /var/lib/luxyai-custom/aiops_algorithms_custom.py
            - name: MODEL_PROFILES_STORE
              value: /var/lib/luxyai/model-profiles.json
            - name: KNOWLEDGE_STORE_PATH
              value: /var/lib/luxyai/knowledge-base.json
            - name: OPS_SKILL_ROOT
              value: /var/lib/luxyai/ops-skills
            - name: OPS_SKILL_STORE_PATH
              value: /var/lib/luxyai/ops-skills.json
            - name: RELIABILITY_STORE_PATH
              value: /var/lib/luxyai/reliability-state.json
            - name: RELIABILITY_STORE_FALLBACK_PATH
              value: /tmp/luxyai/reliability-state.json
            - name: RELIABILITY_STORE_EMERGENCY_PATH
              value: /dev/shm/luxyai/reliability-state.json
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: k8s-agent-langfuse
                  key: public-key
                  optional: true
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: k8s-agent-langfuse
                  key: secret-key
                  optional: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 250m
              memory: 384Mi
            limits:
              cpu: "1"
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 36
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 4
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          volumeMounts:
            - name: runtime-store
              mountPath: /var/lib/luxyai
            - name: private-algorithms
              mountPath: /var/lib/luxyai-custom
              readOnly: true
            - name: runtime-tmp
              mountPath: /tmp
      volumes:
        - name: runtime-store
          persistentVolumeClaim:
            claimName: luxyai-runtime-store
        - name: private-algorithms
          secret:
            secretName: luxyai-custom-algorithms
            optional: true
        - name: runtime-tmp
          emptyDir:
            sizeLimit: 64Mi

---
apiVersion: v1
kind: Service
metadata:
  name: k8s-agent-api
  namespace: k8s-agent
  labels:
    app: k8s-agent-api
spec:
  selector:
    app: k8s-agent-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: k8s-agent-frontend
  namespace: k8s-agent
  labels:
    app: k8s-agent-frontend
spec:
  selector:
    app: k8s-agent-api
  type: NodePort
  externalTrafficPolicy: Cluster
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080

# In production, expose this through your organization's Ingress/Gateway and enforce
# TLS + OIDC; a plaintext NodePort is not created by default.
# Optional: Ingress (adjust according to your cluster's Ingress Controller)
# apiVersion: networking.k8s.io/v1
