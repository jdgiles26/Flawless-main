apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: luxyai-pdb
  namespace: k8s-agent
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: luxyai
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: luxyai-hpa
  namespace: k8s-agent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: luxyai
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 65
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      selectPolicy: Min
