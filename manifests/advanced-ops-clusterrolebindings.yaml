# ============================================================
# Advanced Operations ClusterRoleBindings
#
# Purpose:
# - Let k8s-agent-sa perform controlled remediation, node containment, static PV creation,
#   and release governance across the entire cluster.
# - Suited for a "global automated on-call mode": the system generates a plan and executes
#   after operator confirmation.
#
# Security boundary:
# - cluster-admin is not bound here.
# - The actions that can actually run are still constrained by the backend ACTION_CATALOG,
#   risk gates, human confirmation, OPS_MUTATION_ENABLED, AUTONOMOUS_OPS_ENABLED, and the
#   audit trail.
# - In production, it's recommended to set AUTONOMOUS_OPS_ENABLED='false' first, so every
#   change requires human confirmation.
#
# Enable:
#   kubectl apply -f manifests/rbac.yaml
#   kubectl apply -f manifests/advanced-ops-clusterrolebindings.yaml
#
# Rollback:
#   kubectl delete -f manifests/advanced-ops-clusterrolebindings.yaml
# ============================================================

---
# Core remediation capabilities: Workload patch/restart/scale, Pod recreate/evict, HPA, PVC,
# ServiceAccount imagePullSecret, ConfigMap recovery.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-agent-remediator-all-namespaces
subjects:
  - kind: ServiceAccount
    name: k8s-agent-sa
    namespace: k8s-agent
roleRef:
  kind: ClusterRole
  name: k8s-agent-remediator
  apiGroup: rbac.authorization.k8s.io

---
# Node containment capability: allows cordon/uncordon of nodes under pressure or exhibiting
# anomalies after confirmation.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-agent-node-containment-binding
subjects:
  - kind: ServiceAccount
    name: k8s-agent-sa
    namespace: k8s-agent
roleRef:
  kind: ClusterRole
  name: k8s-agent-node-containment
  apiGroup: rbac.authorization.k8s.io

---
# Static storage provisioning capability: allows creating a static PV after human confirmation,
# and handles PVC creation/patching.
# Should be used together with AUTO_OPS_STATIC_PV_TEMPLATE_JSON or the NFS backend parameters.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-agent-storage-provisioner-binding
subjects:
  - kind: ServiceAccount
    name: k8s-agent-sa
    namespace: k8s-agent
roleRef:
  kind: ClusterRole
  name: k8s-agent-storage-provisioner
  apiGroup: rbac.authorization.k8s.io

---
# Release governance capability: allows the platform to act as a release entry point,
# creating or patching Deployment/StatefulSet/DaemonSet, Service, and PDB. If you only want
# some namespaces to be releasable, use the RoleBinding example file instead.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-agent-release-manager-all-namespaces
subjects:
  - kind: ServiceAccount
    name: k8s-agent-sa
    namespace: k8s-agent
roleRef:
  kind: ClusterRole
  name: k8s-agent-release-manager
  apiGroup: rbac.authorization.k8s.io
