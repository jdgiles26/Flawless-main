# ============================================================
# RBAC — k8s-agent namespace + cross-namespace operation permissions
#
# k8s-agent-sa needs read-only and controlled patch permissions for common K8s resources
# across the cluster. The namespaces that can actually be operated on remain protected by the
# application-side ALLOWED_NAMESPACES as a second layer.
# ============================================================

---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: k8s-agent
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted

---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-agent-sa
  namespace: k8s-agent

---
# ============================================================
# ClusterRole — read-only discovery permissions across all namespaces
# ============================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-agent-reader
rules:
  - apiGroups: [""]
    resources:
      - namespaces
      - pods
      - pods/log
      - pods/status
      - events
      - nodes
      - services
      - endpoints
      - persistentvolumeclaims
      - persistentvolumes
    verbs: [get, list, watch]

  # Quota is required for scheduling diagnostics. ConfigMap/Secret names are
  # derived from Pod references; their objects and values are not read.
  - apiGroups: [""]
    resources:
      - resourcequotas
    verbs: [get, list]

  - apiGroups: ["apps"]
    resources:
      - deployments
      - deployments/scale
      - statefulsets
      - statefulsets/scale
      - daemonsets
      - replicasets
    verbs: [get, list, watch]

  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: [get, list]

  - apiGroups: ["policy"]
    resources:
      - poddisruptionbudgets
    verbs: [get, list, watch]

  - apiGroups: ["metrics.k8s.io"]
    resources:
      - pods
      - nodes
    verbs: [get, list]

  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs: [get, list]

  - apiGroups: ["discovery.k8s.io"]
    resources:
      - endpointslices
    verbs: [get, list, watch]

  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
    verbs: [get, list]

  - apiGroups: ["authorization.k8s.io"]
    resources:
      - selfsubjectaccessreviews
    verbs: [create]

  - apiGroups: ["networking.istio.io"]
    resources:
      - virtualservices
      - destinationrules
      - gateways
    verbs: [get, list]

---
# ClusterRoleBinding — bound to k8s-agent-sa
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-agent-reader-binding
subjects:
  - kind: ServiceAccount
    name: k8s-agent-sa
    namespace: k8s-agent
roleRef:
  kind: ClusterRole
  name: k8s-agent-reader
  apiGroup: rbac.authorization.k8s.io

---
# Remediation permissions are not granted via a ClusterRoleBinding. Each approved namespace
# must have its own RoleBinding created individually; see remediation-rolebinding.example.yaml
# for an example.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-agent-remediator
rules:
  - apiGroups: ["apps"]
    resources:
      - deployments
      - deployments/scale
      - statefulsets
      - statefulsets/scale
      - daemonsets
    verbs: [get, patch]

  # Namespace RoleBinding + ALLOWED_NAMESPACES remain the two authorization
  # boundaries for every mutable action.
  - apiGroups: [""]
    resources:
      - pods
    verbs: [get, delete]
  - apiGroups: ["policy"]
    resources:
      - pods/eviction
    verbs: [create]
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: [get, patch]
  - apiGroups: [""]
    resources:
      - persistentvolumeclaims
    verbs: [get, create, patch]
  - apiGroups: [""]
    resources:
      - serviceaccounts
    verbs: [get, patch]
  - apiGroups: [""]
    resources:
      - configmaps
    verbs: [get, create]

---
# Optional high-risk node containment capability. It deliberately has no
# binding. Security administrators may bind it only after reviewing the node
# isolation runbook and approval workflow.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-agent-node-containment
rules:
  - apiGroups: [""]
    resources: [nodes]
    verbs: [get, patch]

---
# Optional release-management capability. It deliberately has no binding.
# Bind it with a namespace RoleBinding only where this platform is the approved release entrypoint.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-agent-release-manager
rules:
  - apiGroups: ["apps"]
    resources: [deployments, statefulsets, daemonsets]
    verbs: [get, create, patch]
  - apiGroups: [""]
    resources: [services]
    verbs: [get, patch]
  - apiGroups: ["policy"]
    resources: [poddisruptionbudgets]
    verbs: [get, patch]

---
# Optional high-risk storage provisioning capability. It deliberately has no
# binding. Bind it only for clusters where the platform is allowed to create static
# PVs after human approval; hostPath PVs are still rejected by application policy.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-agent-storage-provisioner
rules:
  - apiGroups: [""]
    resources: [persistentvolumes]
    verbs: [get, create]
  - apiGroups: [""]
    resources: [persistentvolumeclaims]
    verbs: [get, create, patch]

---
# Only allow the platform to self-heal in its own namespace; business namespaces require
# explicit authorization.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k8s-agent-platform-remediator
  namespace: k8s-agent
subjects:
  - kind: ServiceAccount
    name: k8s-agent-sa
    namespace: k8s-agent
roleRef:
  kind: ClusterRole
  name: k8s-agent-remediator
  apiGroup: rbac.authorization.k8s.io
